name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # Lint
  # ============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            mundial-erp-api/package-lock.json
            mundial-erp-web/package-lock.json

      - name: Install API dependencies
        working-directory: mundial-erp-api
        run: npm ci

      - name: Install Web dependencies
        working-directory: mundial-erp-web
        run: npm ci

      - name: Lint API
        working-directory: mundial-erp-api
        run: npx eslint src --ext .ts --max-warnings 0

      - name: Lint Web
        working-directory: mundial-erp-web
        run: npx eslint src --ext .ts,.tsx --max-warnings 0

  # ============================================================================
  # Test
  # ============================================================================
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mundial_erp_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mundial-erp-api/package-lock.json

      - name: Install dependencies
        working-directory: mundial-erp-api
        run: npm ci

      - name: Generate Prisma client
        working-directory: mundial-erp-api
        run: npx prisma generate

      - name: Run database migrations
        working-directory: mundial-erp-api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/mundial_erp_test?schema=public
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: mundial-erp-api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/mundial_erp_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-ci
          JWT_REFRESH_SECRET: test-refresh-secret-ci
          NODE_ENV: test
        run: npm test -- --passWithNoTests

  # ============================================================================
  # Build
  # ============================================================================
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            mundial-erp-api/package-lock.json
            mundial-erp-web/package-lock.json

      - name: Install & Build API
        working-directory: mundial-erp-api
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Install & Build Web
        working-directory: mundial-erp-web
        run: |
          npm ci
          npm run build

  # ============================================================================
  # Docker Build (main branch only)
  # ============================================================================
  docker:
    name: Docker Build
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t mundial-erp-api:${{ github.sha }} ./mundial-erp-api

      - name: Build Web image
        run: docker build -t mundial-erp-web:${{ github.sha }} ./mundial-erp-web

  # ============================================================================
  # Deploy to Coolify (main branch only, after Docker build passes)
  # ============================================================================
  deploy:
    name: Deploy to Coolify
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Detect changed paths
        id: changes
        run: |
          API_CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -c '^mundial-erp-api/' || true)
          WEB_CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -c '^mundial-erp-web/' || true)
          ROOT_CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -cE '^(docker-compose|nginx|\.github)' || true)
          echo "api=${API_CHANGED}" >> $GITHUB_OUTPUT
          echo "web=${WEB_CHANGED}" >> $GITHUB_OUTPUT
          echo "root=${ROOT_CHANGED}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy API to Coolify
        if: steps.changes.outputs.api != '0' || steps.changes.outputs.root != '0'
        run: |
          echo "Triggering API deploy..."
          curl -f -s \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=m9wm9vcwuq26cfs40r2ndyo8&force=false"
          echo "API deploy triggered."

      - name: Wait for API health
        if: steps.changes.outputs.api != '0' || steps.changes.outputs.root != '0'
        run: |
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://m9wm9vcwuq26cfs40r2ndyo8.193.203.183.176.sslip.io/health 2>/dev/null; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 10s..."
            sleep 10
          done
          echo "WARNING: API health check timed out, continuing with web deploy"

      - name: Deploy Web to Coolify
        if: steps.changes.outputs.web != '0' || steps.changes.outputs.root != '0'
        run: |
          echo "Triggering Web deploy..."
          curl -f -s \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=vb1nzc8vb1r1ekltraurxgbb&force=false"
          echo "Web deploy triggered."
